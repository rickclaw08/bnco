# fly.toml - SIP Connector Architecture
#
# Key differences from the Media Streams version:
# - No WebSocket upgrade needed for Twilio media streams
# - No audio bandwidth - only webhook POST + monitoring WS traffic
# - Can use smaller VM since we're not proxying audio
# - min_machines_running=1 because webhook must be available for incoming calls

app = 'clawops-receptionist'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.sip'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # Webhook requests are small and fast - tight timeout is fine
  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512  # Half the memory - no audio buffering needed
