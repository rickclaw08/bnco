# bnco API - Fly.io Configuration
# Alternative deployment target
# Deploy: fly deploy --config src/connect-layer/fly.toml

app = "bnco-api"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  port = 3001
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
