# bnco - Docker Compose (Production-like)
# Usage: docker-compose up -d

services:
  api:
    build:
      context: ./src/connect-layer
      dockerfile: Dockerfile
      target: production
    container_name: bnco-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://bnco:bnco_secret@postgres:5432/bnco
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      WHOOP_CLIENT_ID: ${WHOOP_CLIENT_ID}
      WHOOP_CLIENT_SECRET: ${WHOOP_CLIENT_SECRET}
      WHOOP_REDIRECT_URI: ${WHOOP_REDIRECT_URI}
      WHOOP_WEBHOOK_SECRET: ${WHOOP_WEBHOOK_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://bnco.app}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - bnco-network

  postgres:
    image: postgres:16-alpine
    container_name: bnco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bnco
      POSTGRES_USER: bnco
      POSTGRES_PASSWORD: bnco_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/connect-layer/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bnco -d bnco"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bnco-network

  redis:
    image: redis:7-alpine
    container_name: bnco-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - bnco-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  bnco-network:
    driver: bridge
