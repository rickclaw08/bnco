<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | ClawOps</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="48x48">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX', { send_page_view: true });
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #050810;
      --accent-bright: #4ade80;
      --accent-mid: #22c55e;
      --cyan-bright: #00e5cc;
      --text-primary: #f0f4ff;
      --text-secondary: #8892b0;
      --border-accent: rgba(74, 222, 128, .3);
      --logo-glow: rgba(74, 222, 128, .4);
      --font-display: "Space Grotesk", system-ui, sans-serif;
      --font-body: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 600px; }
    .logo {
      width: 100px; height: 100px;
      margin: 0 auto 32px;
      animation: float 4s ease-in-out infinite;
    }
    .logo svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 20px var(--logo-glow));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--cyan-bright) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .code {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--accent-bright);
      margin-bottom: 16px;
      letter-spacing: .05em;
    }
    p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-primary {
      display: inline-block;
      background: var(--accent-mid);
      color: var(--bg-deep);
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: all .25s;
    }
    .btn-primary:hover {
      background: var(--accent-bright);
      box-shadow: 0 0 30px var(--logo-glow);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Lobster body - elongated pill shape -->
        <ellipse cx="60" cy="58" rx="22" ry="30" fill="url(#hero-grad)"/>
        <!-- Head - rounded top -->
        <ellipse cx="60" cy="30" rx="18" ry="16" fill="url(#hero-grad)"/>
        <!-- Body segment lines -->
        <path d="M42 50 Q60 47 78 50" stroke="rgba(0,80,30,0.25)" stroke-width="1" fill="none"/>
        <path d="M40 60 Q60 57 80 60" stroke="rgba(0,80,30,0.20)" stroke-width="1" fill="none"/>
        <path d="M41 70 Q60 67 79 70" stroke="rgba(0,80,30,0.15)" stroke-width="1" fill="none"/>
        <!-- Tail fan -->
        <ellipse cx="52" cy="96" rx="8" ry="5" fill="url(#hero-grad)" transform="rotate(-15 52 96)"/>
        <ellipse cx="60" cy="98" rx="8" ry="5" fill="url(#hero-grad)"/>
        <ellipse cx="68" cy="96" rx="8" ry="5" fill="url(#hero-grad)" transform="rotate(15 68 96)"/>
        <path d="M60 88 L60 93" stroke="rgba(0,80,30,0.20)" stroke-width="1"/>
        <!-- Left claw -->
        <path d="M30 30 C18 22 8 28 10 38 C12 48 22 46 28 38 C32 32 30 30 30 30Z" fill="url(#hero-grad)"/>
        <path d="M14 32 Q18 36 14 40" stroke="rgba(0,80,30,0.25)" stroke-width="1" fill="none"/>
        <!-- Right claw -->
        <path d="M90 30 C102 22 112 28 110 38 C108 48 98 46 92 38 C88 32 90 30 90 30Z" fill="url(#hero-grad)"/>
        <path d="M106 32 Q102 36 106 40" stroke="rgba(0,80,30,0.25)" stroke-width="1" fill="none"/>
        <!-- Antennae - long and curved -->
        <path d="M50 18 Q40 4 28 2" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
        <path d="M70 18 Q80 4 92 2" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
        <!-- Small legs (4 pairs) -->
        <line x1="40" y1="48" x2="32" y2="52" stroke="url(#hero-grad)" stroke-width="2" stroke-linecap="round"/>
        <line x1="80" y1="48" x2="88" y2="52" stroke="url(#hero-grad)" stroke-width="2" stroke-linecap="round"/>
        <line x1="39" y1="56" x2="30" y2="60" stroke="url(#hero-grad)" stroke-width="2" stroke-linecap="round"/>
        <line x1="81" y1="56" x2="90" y2="60" stroke="url(#hero-grad)" stroke-width="2" stroke-linecap="round"/>
        <line x1="39" y1="64" x2="31" y2="68" stroke="url(#hero-grad)" stroke-width="2" stroke-linecap="round"/>
        <line x1="81" y1="64" x2="89" y2="68" stroke="url(#hero-grad)" stroke-width="2" stroke-linecap="round"/>
        <line x1="40" y1="72" x2="33" y2="76" stroke="url(#hero-grad)" stroke-width="2" stroke-linecap="round"/>
        <line x1="80" y1="72" x2="87" y2="76" stroke="url(#hero-grad)" stroke-width="2" stroke-linecap="round"/>
        <!-- Eyes -->
        <circle cx="51" cy="28" r="5" fill="#050810"/>
        <circle cx="69" cy="28" r="5" fill="#050810"/>
        <circle cx="52" cy="27" r="2" fill="#00e5cc"/>
        <circle cx="70" cy="27" r="2" fill="#00e5cc"/>
        <defs><linearGradient id="hero-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#166534"/></linearGradient></defs>
      </svg>
    </div>
    <div class="code">// 404: page_not_found</div>
    <h1>Oops!</h1>
    <p>This page wandered off. The lobster could not catch it. Let's get you back on track.</p>
    <a href="/" class="btn-primary">Back to Home</a>
  </div>
</body>
</html>
