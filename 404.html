<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | ClawOps</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="48x48">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX', { send_page_view: true });
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #050810;
      --accent-bright: #4ade80;
      --accent-mid: #22c55e;
      --cyan-bright: #00e5cc;
      --text-primary: #f0f4ff;
      --text-secondary: #8892b0;
      --border-accent: rgba(74, 222, 128, .3);
      --logo-glow: rgba(74, 222, 128, .4);
      --font-display: "Space Grotesk", system-ui, sans-serif;
      --font-body: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 600px; }
    .logo {
      width: 100px; height: 100px;
      margin: 0 auto 32px;
      animation: float 4s ease-in-out infinite;
    }
    .logo svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 20px var(--logo-glow));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--cyan-bright) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .code {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--accent-bright);
      margin-bottom: 16px;
      letter-spacing: .05em;
    }
    p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-primary {
      display: inline-block;
      background: var(--accent-mid);
      color: var(--bg-deep);
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: all .25s;
    }
    .btn-primary:hover {
      background: var(--accent-bright);
      box-shadow: 0 0 30px var(--logo-glow);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Buff Armored Crab -->
        <!-- Legs left (4 thick jointed) -->
        <path d="M32 68 L16 60 L8 64" stroke="url(#g404)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M30 76 L12 72 L4 78" stroke="url(#g404)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M30 84 L12 86 L4 92" stroke="url(#g404)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M34 90 L18 98 L12 106" stroke="url(#g404)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <!-- Legs right (4 thick jointed) -->
        <path d="M88 68 L104 60 L112 64" stroke="url(#g404)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M90 76 L108 72 L116 78" stroke="url(#g404)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M90 84 L108 86 L116 92" stroke="url(#g404)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M86 90 L102 98 L108 106" stroke="url(#g404)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <!-- Main shell (wide armored carapace) -->
        <ellipse cx="60" cy="72" rx="32" ry="24" fill="url(#g404)"/>
        <!-- Armor plate lines -->
        <path d="M36 62 Q60 54 84 62" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>
        <path d="M32 72 Q60 62 88 72" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
        <path d="M34 82 Q60 74 86 82" stroke="rgba(255,255,255,0.10)" stroke-width="1" fill="none"/>
        <!-- Central ridge -->
        <line x1="60" y1="50" x2="60" y2="92" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
        <!-- Head plate -->
        <ellipse cx="60" cy="56" rx="20" ry="12" fill="url(#g404)"/>
        <!-- Head armor detail -->
        <path d="M46 54 Q60 48 74 54" stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none"/>
        <!-- Left claw arm -->
        <path d="M38 58 C28 48 18 42 12 44" stroke="url(#g404)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
        <!-- Left claw -->
        <path d="M12 44 C4 38 -2 34 0 30 C2 26 8 28 12 32 L14 36" fill="url(#g404)"/>
        <path d="M12 44 C4 48 -2 52 2 56 C6 58 10 54 12 50 L14 46" fill="url(#g404)"/>
        <!-- Left claw muscle ridges -->
        <path d="M10 34 L6 38" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" fill="none"/>
        <path d="M8 36 L4 40" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" fill="none"/>
        <path d="M8 48 L4 52" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" fill="none"/>
        <!-- Right claw arm -->
        <path d="M82 58 C92 48 102 42 108 44" stroke="url(#g404)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
        <!-- Right claw -->
        <path d="M108 44 C116 38 122 34 120 30 C118 26 112 28 108 32 L106 36" fill="url(#g404)"/>
        <path d="M108 44 C116 48 122 52 118 56 C114 58 110 54 108 50 L106 46" fill="url(#g404)"/>
        <!-- Right claw muscle ridges -->
        <path d="M110 34 L114 38" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" fill="none"/>
        <path d="M112 36 L116 40" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" fill="none"/>
        <path d="M112 48 L116 52" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" fill="none"/>
        <!-- Eyes -->
        <circle cx="50" cy="52" r="4" fill="#050810"/>
        <circle cx="70" cy="52" r="4" fill="#050810"/>
        <circle cx="51" cy="51" r="2" fill="#00e5cc"/>
        <circle cx="71" cy="51" r="2" fill="#00e5cc"/>
        <!-- Eye glow rings -->
        <circle cx="51" cy="51" r="3.5" fill="none" stroke="#00e5cc" stroke-width="0.5" opacity="0.4"/>
        <circle cx="71" cy="51" r="3.5" fill="none" stroke="#00e5cc" stroke-width="0.5" opacity="0.4"/>
        <defs><linearGradient id="g404" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#166534"/></linearGradient></defs>
      </svg>
    </div>
    <div class="code">// 404: page_not_found</div>
    <h1>Oops!</h1>
    <p>This page wandered off. The crab could not catch it. Let's get you back on track.</p>
    <a href="/" class="btn-primary">Back to Home</a>
  </div>
</body>
</html>
