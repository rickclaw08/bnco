<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | ClawOps</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="48x48">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX', { send_page_view: true });
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #050810;
      --accent-bright: #4ade80;
      --accent-mid: #22c55e;
      --cyan-bright: #00e5cc;
      --text-primary: #f0f4ff;
      --text-secondary: #8892b0;
      --border-accent: rgba(74, 222, 128, .3);
      --logo-glow: rgba(74, 222, 128, .4);
      --font-display: "Space Grotesk", system-ui, sans-serif;
      --font-body: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 600px; }
    .logo {
      width: 100px; height: 100px;
      margin: 0 auto 32px;
      animation: float 4s ease-in-out infinite;
    }
    .logo svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 20px var(--logo-glow));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--cyan-bright) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .code {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--accent-bright);
      margin-bottom: 16px;
      letter-spacing: .05em;
    }
    p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-primary {
      display: inline-block;
      background: var(--accent-mid);
      color: var(--bg-deep);
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: all .25s;
    }
    .btn-primary:hover {
      background: var(--accent-bright);
      box-shadow: 0 0 30px var(--logo-glow);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Scorpion legs (4 pairs) -->
        <path d="M38 62 L18 72 L10 68" stroke="url(#g404)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M38 70 L15 82 L8 80" stroke="url(#g404)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M38 78 L18 92 L12 92" stroke="url(#g404)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M38 86 L22 100 L18 102" stroke="url(#g404)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M82 62 L102 72 L110 68" stroke="url(#g404)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M82 70 L105 82 L112 80" stroke="url(#g404)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M82 78 L102 92 L108 92" stroke="url(#g404)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M82 86 L98 100 L102 102" stroke="url(#g404)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <!-- Body segments -->
        <ellipse cx="60" cy="80" rx="24" ry="18" fill="url(#g404)"/>
        <ellipse cx="60" cy="62" rx="18" ry="12" fill="url(#g404)"/>
        <ellipse cx="60" cy="50" rx="14" ry="10" fill="url(#g404)"/>
        <!-- Tail (curved up and forward) -->
        <path d="M60 62 C60 44 58 30 54 20 C50 10 48 6 52 4 C56 2 60 8 62 14" stroke="url(#g404)" stroke-width="6" stroke-linecap="round" fill="none"/>
        <!-- Stinger -->
        <path d="M62 14 L66 8 L60 12" fill="url(#g404)" stroke="url(#g404)" stroke-width="1.5"/>
        <!-- Pincer arms -->
        <path d="M46 50 C36 40 24 34 18 36" stroke="url(#g404)" stroke-width="4" stroke-linecap="round" fill="none"/>
        <path d="M74 50 C84 40 96 34 102 36" stroke="url(#g404)" stroke-width="4" stroke-linecap="round" fill="none"/>
        <!-- Left pincer claw -->
        <path d="M18 36 C12 32 8 30 6 34 C4 38 10 40 16 38 Z" fill="url(#g404)"/>
        <path d="M18 36 C14 40 12 44 16 44 C20 44 20 40 18 36 Z" fill="url(#g404)"/>
        <!-- Right pincer claw -->
        <path d="M102 36 C108 32 112 30 114 34 C116 38 110 40 104 38 Z" fill="url(#g404)"/>
        <path d="M102 36 C106 40 108 44 104 44 C100 44 100 40 102 36 Z" fill="url(#g404)"/>
        <!-- Eyes -->
        <circle cx="52" cy="48" r="3.5" fill="#050810"/>
        <circle cx="68" cy="48" r="3.5" fill="#050810"/>
        <circle cx="53" cy="47" r="1.5" fill="#00e5cc"/>
        <circle cx="69" cy="47" r="1.5" fill="#00e5cc"/>
        <defs><linearGradient id="g404" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#166534"/></linearGradient></defs>
      </svg>
    </div>
    <div class="code">// 404: page_not_found</div>
    <h1>Oops!</h1>
    <p>This page wandered off. The scorpion could not catch it. Let's get you back on track.</p>
    <a href="/" class="btn-primary">Back to Home</a>
  </div>
</body>
</html>
