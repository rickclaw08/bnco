<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | ClawOps</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="48x48">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX', { send_page_view: true });
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #050810;
      --accent-bright: #4ade80;
      --accent-mid: #22c55e;
      --cyan-bright: #00e5cc;
      --text-primary: #f0f4ff;
      --text-secondary: #8892b0;
      --border-accent: rgba(74, 222, 128, .3);
      --logo-glow: rgba(74, 222, 128, .4);
      --font-display: "Space Grotesk", system-ui, sans-serif;
      --font-body: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 600px; }
    .logo {
      width: 100px; height: 100px;
      margin: 0 auto 32px;
      animation: float 4s ease-in-out infinite;
    }
    .logo svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 20px var(--logo-glow));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--cyan-bright) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .code {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--accent-bright);
      margin-bottom: 16px;
      letter-spacing: .05em;
    }
    p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-primary {
      display: inline-block;
      background: var(--accent-mid);
      color: var(--bg-deep);
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: all .25s;
    }
    .btn-primary:hover {
      background: var(--accent-bright);
      box-shadow: 0 0 30px var(--logo-glow);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M60 10 C30 10 15 35 15 55 C15 75 30 95 45 100 L43 110 L57 110 L55 100 C55 100 60 102 65 100 L63 110 L77 110 L75 100 C90 95 105 75 105 55 C105 35 90 10 60 10Z" fill="url(#hero-grad)"/>
        <!-- Subtle body segment lines -->
        <path d="M30 62 Q60 58 90 62" stroke="rgba(0,80,30,0.25)" stroke-width="1" fill="none"/>
        <path d="M28 74 Q60 70 92 74" stroke="rgba(0,80,30,0.20)" stroke-width="1" fill="none"/>
        <path d="M32 86 Q60 82 88 86" stroke="rgba(0,80,30,0.15)" stroke-width="1" fill="none"/>
        <!-- Left claw -->
        <path d="M20 45 C5 40 0 50 5 60 C10 70 20 65 25 55 C28 48 25 45 20 45Z" fill="url(#hero-grad)"/>
        <path d="M10 50 Q14 54 10 58" stroke="rgba(0,80,30,0.25)" stroke-width="1" fill="none"/>
        <!-- Right claw -->
        <path d="M100 45 C115 40 120 50 115 60 C110 70 100 65 95 55 C92 48 95 45 100 45Z" fill="url(#hero-grad)"/>
        <path d="M110 50 Q106 54 110 58" stroke="rgba(0,80,30,0.25)" stroke-width="1" fill="none"/>
        <!-- Antennae -->
        <path d="M45 15 Q35 5 30 8" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
        <path d="M75 15 Q85 5 90 8" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
        <!-- Eyes -->
        <circle cx="45" cy="35" r="6" fill="#050810"/>
        <circle cx="75" cy="35" r="6" fill="#050810"/>
        <circle cx="46" cy="34" r="2" fill="#00e5cc"/>
        <circle cx="76" cy="34" r="2" fill="#00e5cc"/>
        <!-- Leg muscle lines -->
        <line x1="44" y1="104" x2="56" y2="104" stroke="rgba(0,80,30,0.20)" stroke-width="1"/>
        <line x1="64" y1="104" x2="76" y2="104" stroke="rgba(0,80,30,0.20)" stroke-width="1"/>
        <defs><linearGradient id="hero-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#166534"/></linearGradient></defs>
      </svg>
    </div>
    <div class="code">// 404: page_not_found</div>
    <h1>Oops!</h1>
    <p>This page wandered off. The crab could not catch it. Let's get you back on track.</p>
    <a href="/" class="btn-primary">Back to Home</a>
  </div>
</body>
</html>
