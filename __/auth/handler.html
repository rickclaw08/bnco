<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ClawOps - Signing In</title>
  <style>
    body {
      background: #050810;
      color: #f0f4ff;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .container { text-align: center; }
    .spinner {
      width: 40px; height: 40px; margin: 20px auto;
      border: 3px solid rgba(0,229,204,0.2);
      border-top-color: #00e5cc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #8892b0; font-size: 0.9rem; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Signing you in to ClawOps...</p>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    var config = {
      apiKey: "AIzaSyATPkQPGHJ6Mk0aQ4FDnKGIy9yBPhclaAM",
      authDomain: "theclawops.com",
      projectId: "clawops-488220"
    };
    firebase.initializeApp(config);

    // This page handles the OAuth redirect callback
    // Firebase Auth will automatically process the redirect result
    firebase.auth().getRedirectResult().then(function(result) {
      // Redirect handled, the calling page's onAuthStateChanged will pick it up
    }).catch(function(error) {
      document.querySelector('.container').innerHTML =
        '<p style="color:#ff6b6b;">Sign-in error: ' + error.message + '</p>' +
        '<p><a href="/" style="color:#00e5cc;">Return to ClawOps</a></p>';
    });
  </script>
</body>
</html>
