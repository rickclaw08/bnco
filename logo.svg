<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lobster body - elongated pill shape -->
  <ellipse cx="60" cy="58" rx="22" ry="30" fill="url(#logo-grad)"/>
  <!-- Head - rounded top -->
  <ellipse cx="60" cy="30" rx="18" ry="16" fill="url(#logo-grad)"/>
  <!-- Body segment lines -->
  <path d="M42 50 Q60 47 78 50" stroke="rgba(0,80,30,0.25)" stroke-width="1" fill="none"/>
  <path d="M40 60 Q60 57 80 60" stroke="rgba(0,80,30,0.20)" stroke-width="1" fill="none"/>
  <path d="M41 70 Q60 67 79 70" stroke="rgba(0,80,30,0.15)" stroke-width="1" fill="none"/>
  <!-- Tail fan -->
  <ellipse cx="52" cy="96" rx="8" ry="5" fill="url(#logo-grad)" transform="rotate(-15 52 96)"/>
  <ellipse cx="60" cy="98" rx="8" ry="5" fill="url(#logo-grad)"/>
  <ellipse cx="68" cy="96" rx="8" ry="5" fill="url(#logo-grad)" transform="rotate(15 68 96)"/>
  <path d="M60 88 L60 93" stroke="rgba(0,80,30,0.20)" stroke-width="1"/>
  <!-- Left claw -->
  <path d="M30 30 C18 22 8 28 10 38 C12 48 22 46 28 38 C32 32 30 30 30 30Z" fill="url(#logo-grad)"/>
  <path d="M14 32 Q18 36 14 40" stroke="rgba(0,80,30,0.25)" stroke-width="1" fill="none"/>
  <!-- Right claw -->
  <path d="M90 30 C102 22 112 28 110 38 C108 48 98 46 92 38 C88 32 90 30 90 30Z" fill="url(#logo-grad)"/>
  <path d="M106 32 Q102 36 106 40" stroke="rgba(0,80,30,0.25)" stroke-width="1" fill="none"/>
  <!-- Antennae - long and curved -->
  <path d="M50 18 Q40 4 28 2" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <path d="M70 18 Q80 4 92 2" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <!-- Small legs (4 pairs) -->
  <line x1="40" y1="48" x2="32" y2="52" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="48" x2="88" y2="52" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="39" y1="56" x2="30" y2="60" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="81" y1="56" x2="90" y2="60" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="39" y1="64" x2="31" y2="68" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="81" y1="64" x2="89" y2="68" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="72" x2="33" y2="76" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="72" x2="87" y2="76" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="51" cy="28" r="5" fill="#050810"/>
  <circle cx="69" cy="28" r="5" fill="#050810"/>
  <circle cx="52" cy="27" r="2" fill="#00e5cc"/>
  <circle cx="70" cy="27" r="2" fill="#00e5cc"/>
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>
</svg>
